{% extends "base.html" %}
{% block content %}

<h2>Products</h2>
<a href="/admin/products/add" class="btn btn-primary mb-3">+ Add Product</a>


<table class="table table-hover bg-white shadow-sm">

  <tr>
    <th>ID</th>
    <th>Name</th>
    <th>Price</th>
    <th>Actions</th>
  </tr>

  {% for p in products %}
  <tr>
    <td>{{ p.id }}</td>
    <td>{{ p.name }}</td>
    <td>₹{{ p.price }}</td>
    <td>
      <a href="/admin/products/edit/{{ p.id }}" class="btn btn-sm btn-primary">Edit</a>
      <a href="/admin/products/delete/{{ p.id }}"
         class="btn btn-sm btn-danger"
         onclick="return confirm('Delete this product?')">
         Delete
      </a>
    </td>
  </tr>
  {% endfor %}
</table>

{% endblock %}
