{% extends "base.html" %}
{% block content %}

<h3>Similar Products</h3>

<p class="text-muted">
  Based on: <b>{{ product.name }}</b>
</p>

<div class="row">

  {% for p in products %}
  <div class="col-md-3">
    <div class="card mb-3">

      <div style="height:180px; display:flex; align-items:center; justify-content:center; background:#f5f5f5;">
        <img
          src="{% if p.image_url and p.image_url.startswith('http') %}
                  {{ p.image_url }}
               {% elif p.image_url %}
                  {{ url_for('static', filename='product_img/' + p.image_url) }}
               {% else %}
                  {{ url_for('static', filename='product_img/no-image.png') }}
               {% endif %}"
          class="card-img-top"
          style="max-height:100%; max-width:100%; object-fit:contain;"
          alt="{{ p.name }}">
      </div>

      <div class="card-body text-center">
        <h6>{{ p.name }}</h6>
        <p class="mb-2">₹{{ p.price }}</p>

        <!-- ✅ FIX -->
        <a href="{{ url_for('add_to_cart', pid=p.id) }}"
           class="btn btn-sm btn-success">
           Add
        </a>

      </div>

    </div>
  </div>
  {% endfor %}

</div>

{% endblock %}
